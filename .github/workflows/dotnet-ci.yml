name: .NET CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Restore, build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore MentorLab.sln

      - name: Build
        run: dotnet build MentorLab.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test MentorLab.sln --configuration Release --no-build --verbosity normal
